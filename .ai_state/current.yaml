assumptions:
  - statement: "The same contract-driven legality pattern will likely still be needed for future ordered roots beyond the currently audited rolling_single/pair/positional/rank families."
    why_it_is_assumed: "the current widened surface is materially larger, but the repository still does not claim arbitrary ordered-root generality."
  - statement: "The next extension beyond corr/cov should still be chosen from measured or reproduced failures rather than from broad function-family symmetry."
    why_it_is_assumed: "v6 fixed a reproduced real-data failure, but the repository does not yet rank the remaining ordered-over-cross candidates."
  - statement: "The current plain-parent satisfaction rule is sufficient for existing pointwise wrappers, but richer operator contracts will still be needed as more operators move off coarse inference."
    why_it_is_assumed: "the current test suite stays green after adding the rule, but registry-backed explicit contracts still cover only a core subset of operators."

risks:
  - statement: "Future ordered roots beyond the current rolling_single/pair/positional/rank coverage may still need explicit family-level treatment."
    failure_mode: "new ordered roots could still show wrong semantics or planner-fail behavior until they receive explicit policy, tests, and routing."
  - statement: "Materialized ordered execution currently supports compiled, staged, and positional input expressions only."
    failure_mode: "if future expressions feed segmented or more complex route types into corr/cov/positional roots, execution may still reject or misroute them until the planner is widened deliberately."
  - statement: "The native positional low-copy bridge uses Polars private Python buffer APIs."
    failure_mode: "future Polars upgrades could change _get_buffers/_get_buffer_info/_from_buffer behavior, so native positional tests and phase benchmarks must be run before accepting a Polars version bump."
  - statement: "V2 lifecycle sweep is intentionally conservative and may recompute a dropped stage if a later route block needs the same expression again."
    failure_mode: "memory improves before reuse economics exists, but some workloads may trade memory for extra compute until batch-level CSE/ref-count planning is introduced."
  - statement: "Planned lifecycle currently covers explicit ordered-batch stage cache keys that can be identified from the existing batch plan, not a full DAG/CSE graph."
    failure_mode: "stage reuse outside the current explicit materialized/staged/positional cache-key surface may still need future planning work before it can be safely optimized."
  - statement: "Native positional group-level parallelism has workload-dependent overhead."
    failure_mode: "single-expression or very small workloads may run faster in serial native mode, while multi-expression positional-heavy workloads benefit more clearly from parallel scan."
  - statement: "Same-process V1/V2 RSS comparisons can be misleading on large Polars workloads because allocator-retained memory from the first run can inflate the second run's measured process RSS."
    failure_mode: "a sequential same-process benchmark may report higher V2 peak_rss_mb even when lifecycle state metrics improve; fair RSS comparison should isolate V1 and V2 in separate Python processes."
  - statement: "M1 native buffer lifetime is currently estimated at the Python/Polars bridge boundary rather than measured inside Rust allocation internals."
    failure_mode: "native buffer byte and release-lag metrics are useful for trend attribution, but exact allocator-level RSS contribution still requires isolated benchmark comparison."
  - statement: "R4 node-store reuse is active for shared expensive ordered DAG nodes in compiled ordered consumers, but it is still a narrow rollout rather than full graph execution."
    failure_mode: "route-local stage caches still exist for several execution families, and node-store reuse is not yet a universal replacement across all planner routes."
  - statement: "Physical-property inference is still partial and not yet a full contract registry for every operator."
    failure_mode: "future operators may silently fall back to coarse property inference until their contracts are made explicit."

open_questions:
  - question: "Which ordered root family should be widened next beyond the current rolling_single/pair/positional/rank coverage?"
    why_open: "argmax/argmin and the numeric single-input rolling family are now widened, but the repository still does not define the next unsupported family boundary."
  - question: "Should materialized ordered expressions become first-class planner graph nodes for wider batch reuse, or stay as a narrow route until more failures are measured?"
    why_open: "v6 fixes correctness and preserves one prepared frame, but it does not yet promote materialized ordered outputs into a fuller reusable graph."
  - question: "How far should operator contracts move from coarse inference into explicit registry-backed property declarations before widening coverage?"
    why_open: "the property model now exists in code and core operators have explicit declarations, but not every operator has moved off coarse inference yet."
  - question: "When should the Python positional deque kernel be replaced with a native backend?"
    why_open: "the phase-3 kernel fixes the computation model and is easy to port, but real minute-data timings still need to decide whether Python scanning is sufficient."
  - question: "When should ordered batch lifecycle move from conservative sweep to planned last-use ref-count drops?"
    why_open: "V2 already records create/consume/drop events, but it does not yet build a full future-consumer model or reuse economics."

next_actions:
  - action: "Move more current operators from coarse property inference into explicit registry-backed contracts."
    success_signal: "planner derives requires/produces for a wider core operator set from one contract source instead of ad-hoc inference helpers."
  - action: "Run the phase-3 positional benchmark on the real minute parquet workload and capture split timings for child materialization vs positional kernel."
    success_signal: "real-data benchmark shows whether the grouped deque kernel removes the previous 100s+ argmax bottleneck or whether a native backend is needed next."
  - action: "Run the stage lifecycle benchmark on the real minute parquet workload and compare V1/V2 peak frame width, alive-at-end stages, dropped stages, and RSS trend."
    success_signal: "real-data profile identifies whether lifecycle sweep meaningfully reduces memory pressure before investing in CSE."
  - action: "Run the M1 memory model benchmark on 8/16/20 expression workloads with native parallel enabled and compare output/native/frame pressure fields."
    success_signal: "benchmarks/m1_memory_model/m1_memory_model_report.md shows peak output columns, native buffer peak bytes, release lag, peak frame columns, RSS, and recomputation count for each workload."
  - action: "Widen executor-native reuse from compiled ordered consumers into more route families once R4 economics are stable on real workloads."
    success_signal: "shared intermediates are looked up by DAG node id across route families, and profiling can distinguish node-store hits from route-local stage-cache hits."
  - action: "Use the real stage lifecycle smoke script as the fixed V1/V2 comparison entry for minute parquet runs."
    success_signal: "benchmarks/stage_lifecycle_real_smoke/real_smoke_report.md contains a reproducible table for RSS, peak cols, live stages, alive-at-end, dropped stages, and total time."
  - action: "Choose one unsupported ordered-over-cross family beyond the current audited surface and decide whether it should materialize or remain planner-failed."
    success_signal: "one reproduced family is named, with either a new family-level materialization route or a locked fail-path policy and rationale."

m4_freeze_status:
  statement: "M4 is frozen under the strong-success path on the 1M real-data pipeline. M4.2 CSE expansion accepted rolling_neutral_add_input with score=1.556. M4.3 unary-chain fusion accepted rolling_unary_chain_ts_mean_into_ts_rank with score=2.743, memory_reduction=2.840%, time_increase=-6.612%, matched_chains=2, nodes_reduced=2, estimated_intermediate_eliminated=16000000, and correctness/audit/isolation guardrails all true."
  accepted_candidates:
    - "m4_cse_expand_repeated_subgraphs"
    - "m4_fuse_deep_operator_chains"
  rejected_candidates: []
  dominant_bottleneck_class: "wide_fanout"
  structure_is_primary_bottleneck: true
  freeze_path: "strong_success"
  safe_to_consider_freeze: true
  safe_to_freeze: true
  m4_frozen: true
  freeze_rules:
    - "no new M4 proposal is introduced in the current cycle"
    - "no materialized-intermediate elimination in the current freeze window"
    - "no wide-fanout batching in the current freeze window"
    - "no heavy-path rewrite in the current freeze window"
    - "accepted knobs are retained: planner_cse_mode=expanded_repeated_family and fusion_mode=unary_chain_fusion"
  reopen_conditions:
    - "new workload shows materially larger wide_fanout pressure"
    - "accepted CSE or fusion candidate becomes unstable on real data"
    - "refreshed structural report identifies a new dominant family"
    - "a deliberate M4+ cycle is opened with a new proposal/executable/score contract"
  artifacts:
    - "benchmarks/m3_auto_pipeline_1m/m4_fusion_audit.json"
    - "benchmarks/m3_auto_pipeline_1m/m4_fusion_candidate_report.md"
    - "benchmarks/m3_auto_pipeline_1m/m4_3_fusion_decision.md"
    - "benchmarks/m3_auto_pipeline_1m/m4_freeze_review.md"
    - "benchmarks/m3_auto_pipeline_1m/m4_value_summary.yaml"

