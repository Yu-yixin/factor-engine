schema_version: "1.0"
document_type: "ai_current_state"

project:
  name: "factor-engine"

status:
  summary: "Current repository truth is now a pre-full-native rolling freeze: corr/cov semantics are locked by golden and parity coverage, the native corr/cov prototype built and ran, the first A/B gate rejected the current Python-object bridge, positional low-copy remains the reference native bridge, and the next step is documentation plus instrumentation planning only."
  phase: "pre-full-native-rolling"

focus:
  objective: "Freeze current pre-full-native rolling state, keep the rejected corr/cov native prototype experimental-only, and prepare the next low-copy corr/cov instrumentation plan without implementing it."
  primary_paths:
    - ".ai_state/current.yaml"
    - "src/factor_engine/physical_properties.py"
    - "src/factor_engine/registry.py"
    - "src/factor_engine/planner.py"
