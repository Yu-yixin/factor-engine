schema_version: "1.0"
document_type: "ai_current_state"

project:
  name: "factor-engine"

status:
  summary: "execution semantics now have code-level PhysicalProperties, registry-backed explicit property contracts for core operators, audited materialized ordered coverage for rolling_single/pair/positional/rank families, ordered-batch explicit stage lifecycle profiling/sweep, and a P1 native positional kernel with low-copy bridge plus group-level parallel scan."
  phase: "p1_native_positional_closed"

focus:
  objective: "Keep ordered-over-cross legality explicit, maintain planned lifecycle profiling, and use the native positional kernel as the stable baseline before any full DAG/CSE work."
  primary_paths:
    - ".ai_state/current.yaml"
    - "src/factor_engine/physical_properties.py"
    - "src/factor_engine/registry.py"
    - "src/factor_engine/planner.py"
    - "src/factor_engine/executor.py"
    - "src/factor_engine/engine.py"
    - "src/factor_engine/native_positional.py"
    - "tests/test_engine.py"
    - "tests/test_planner.py"
    - "tests/test_executor_new_functions.py"
    - "docs/execution_planner_v6.md"
    - "docs/execution_planning_optimization.md"
    - "examples/benchmark_positional_rolling.py"
    - "examples/benchmark_positional_phases.py"
    - "examples/benchmark_stage_lifecycle.py"
    - "examples/benchmark_stage_lifecycle_real_smoke.py"
    - "benchmarks/positional_rolling.md"
    - "benchmarks/stage_lifecycle.md"
    - "docs/stage_lifecycle.md"
    - "docs/native_positional_kernel.md"
  in_scope:
    - "Use code-level physical properties and satisfies(...) to drive legality checks"
    - "Keep corr/cov, positional, and staged regressions green while removing legality decisions from implicit profile branching"
    - "Move core operator requires/produces contracts into registry-backed explicit property declarations"
    - "Treat argmax/argmin as a separate positional rolling family instead of an ordinary rolling aggregate"
    - "Replace callback/list/horizontal positional rolling hot paths with a grouped monotonic-deque kernel for argmax/argmin roots"
    - "Keep old pure-Polars positional helpers as fallback/reference implementations, not as the default root path"
    - "Profile explicit ordered-batch stages with run/batch/stage/event outputs"
    - "Apply conservative lifecycle sweep to ordered-batch explicit stages"
    - "Choose the next ordered-over-cross boundary after rolling_single/pair/positional/rank coverage"
  out_of_scope:
    - "Automation (hooks, scripts)"
    - "Schema redesign"
    - "Adding pointer/index/meta systems"
    - "Full DAG/CSE rollout"
  constraints:
    - "Do not change locked schema structure"
    - "Do not duplicate git diff or benchmark raw outputs into state"
    - "Keep state concise and maintainable"

