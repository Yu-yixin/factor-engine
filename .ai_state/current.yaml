    - "docs/architecture/l1_5_residency_distance_closure.md"
    - "docs/architecture/l2_1_active_lifecycle_first_wave.md"
    - "docs/architecture/l2_2_active_lifecycle_controlled_expansion.md"
    - "docs/architecture/l2_3_lifecycle_capability_hardening.md"
    - "docs/architecture/l3a_native_heavy_lifecycle_design.md"
    - "docs/architecture/l3a_1_native_heavy_feasibility_review.md"
    - "docs/architecture/l3b_working_frame_helper_lifecycle.md"
    - "docs/architecture/l3b_1_helper_lifecycle_acceptance.md"
    - "docs/architecture/l3b_2_helper_lifecycle_implementation_design.md"
    - "docs/architecture/l3b_3_helper_first_wave_active_drop.md"
    - "docs/architecture/l3b_4_nested_helper_lifecycle_probe.md"
    - "docs/architecture/l3b_5_second_wave_nested_helper_active_drop.md"
    - "docs/architecture/m2_5_lifecycle_freeze_and_m3_v1_pipeline.md"
    - "docs/architecture/m3_auto_pipeline_and_m4_bridge.md"
    - "examples/benchmark_r4_executor_reuse.py"
    - "docs/native_positional_kernel.md"
  in_scope:
    - "Use code-level physical properties and satisfies(...) to drive legality checks"
    - "Keep corr/cov, positional, and staged regressions green while removing legality decisions from implicit profile branching"
    - "Move core operator requires/produces contracts into registry-backed explicit property declarations"
    - "Treat argmax/argmin as a separate positional rolling family instead of an ordinary rolling aggregate"
    - "Replace callback/list/horizontal positional rolling hot paths with a grouped monotonic-deque kernel for argmax/argmin roots"
    - "Keep old pure-Polars positional helpers as fallback/reference implementations, not as the default root path"
    - "Profile explicit ordered-batch stages with run/batch/stage/event outputs"
    - "Apply conservative lifecycle sweep to ordered-batch explicit stages"
    - "Profile output retention and native output buffer lifetime in evaluate_many workloads"
    - "Defer ordered-batch output attach so user outputs do not widen the working frame before restore/finalize"
    - "Build stable canonical value identity and inspectable DAG/CSE metadata before further lifecycle work"
    - "Keep current CSE narrow: repeated expensive ordered/window nodes can be shared; repeated cheap nodes stay inline"
    - "Keep node-aware materialization metadata lifecycle-ready without adding new ref-count drop scheduling yet"
    - "Enforce executor-native reuse for shared expensive ordered DAG nodes and record compute/hit economics"
    - "Split compiled output evaluation from restore assembly and append timing"
    - "Separate node-store read count from reuse consumer count"
    - "Keep lifecycle entry limited to observability gates; do not add active drop"
    - "Record planner-level producer_step, consumer_steps, last_use_step, ref_count_initial, drop_candidate, and blocker reason"
    - "Record executor materialized/read/release-lag trace without changing store behavior"
    - "Quantify structural release lag and potential live bytes-step savings before any active drop"
    - "Active-drop only first-wave node-store entries under lifecycle=True; keep native-heavy as probe"
    - "Expand active drop only within the existing non-native materialize_for_both class across multi-node, nested, and partial-reuse DAG shapes"
    - "Allow helper_lifecycle_mode=second_wave_nested only for pure nested helper-chain active drop; keep first_wave helper semantics unchanged"
    - "Run M2.5 freeze validation before extending lifecycle or accepting M3 materialization changes"
    - "Separate M3 optimization ideas into proposal candidates and executable candidates; only executable candidates with real engine knobs can be benchmarked and scored"
    - "Score M3.v1 executable materialization discipline candidates with memory/frame-width/time before acceptance"
    - "Use M3 executable optimization history to skip repeated candidates and trigger M4 bridge only when executable space is exhausted, proposal queue is empty, and no positive score remains"
    - "Choose the next ordered-over-cross boundary after rolling_single/pair/positional/rank coverage"
  out_of_scope:
    - "Automation (hooks, scripts)"
    - "Schema redesign"
    - "Adding pointer/index/meta systems"
    - "Full DAG/CSE rollout"
    - "Implementing M4 structural optimizations directly from the bridge report"
  constraints:
    - "Do not change locked schema structure"
    - "Do not duplicate git diff or benchmark raw outputs into state"
    - "Keep state concise and maintainable"

